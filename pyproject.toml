[tool.pytest.ini_options]
pythonpath = ["apps"]
addopts = "--cov=apps --cov-report=html --cov-report=term-missing"

[tool.ruff]
target-version = "py313"
line-length = 120
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*.egg-info",
    "dist",
    "build",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E501"]
# Aligned sensor/entity definition tables exceed 120 chars; acceptable for readability
"apps/kermi_bridge/kermi_bridge.py" = ["E501"]
